<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=1"/>
		<title>Metal Gear Solid</title>
		<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
		<script>
			var missions = [
				{
					id: 1,
					type: "campaign",
					name: "Cargo Dock",
					video: "https://youtu.be/MeYbHWQrM9A",
					startTime: 0,
					endTime: 304
				},
				{
					id: 2,
					type: "campaign",
					name: "Helipad",
					video: "https://youtu.be/MeYbHWQrM9A",
					startTime: 304,
					endTime: 600
				},
				{
					id: 3,
					type: "campaign",
					name: "Holding Cells"
				},
				{
					id: 4,
					type: "campaign",
					name: "Revolver Ocelot"
				},
				{
					id: 5,
					type: "campaign",
					name: "Tank Ambush"
				},
				{
					id: 6,
					type: "campaign",
					name: "Nuclear Warhead Storage Building"
				},
				{
					id: 7,
					type: "campaign",
					name: "Cyborg Ninja"
				},
				{
					id: 8,
					type: "campaign",
					name: "Psycho Mantic"
				},
				{
					id: 9,
					type: "campaign",
					name: "Prison Break"
				},
				{
					id: 10,
					type: "campaign",
					name: "Helicopter Gunship"
				},
				{
					id: 11,
					type: "campaign",
					name: "Sniper Wolf"
				},
				{
					id: 12,
					type: "campaign",
					name: "Vulcan Raven"
				},
				{
					id: 13,
					type: "campaign",
					name: "PAL Override"
				},
				{
					id: 14,
					type: "campaign",
					name: "Metal Gear Rex"
				},
				{
					id: "i",
					type: "VR",
					name: "Recon"
				},
				{
					id: "ii",
					type: "VR",
					name: "Escape"
				},
				{
					id: "iii",
					type: "VR",
					name: "Sabotage"
				},
				{
					id: "iv",
					type: "VR",
					name: "Stealth"
				},
				{
					id: "v",
					type: "VR",
					name: "Hostage Rescue"
				},
				{
					id: "vi",
					type: "VR",
					name: "Coordination"
				}
			]

			function outputMissions()
			{
				var missionList = document.getElementById("missionList");
				missions.forEach(mission => {
					switch(mission.type)
					{
						case "campaign":
							var missionButton = document.createElement("button");
							missionButton.className = "w3-btn w3-block w3-red w3-center-align";
							missionButton.innerText = "Mission " + mission.id;
							missionButton.onclick = function() { showAccordion("Mission" + mission.id) };
							missionList.appendChild(missionButton);
							var missionContent = document.createElement("div");
							missionContent.id = "Mission" + mission.id;
							missionContent.className = "w3-container w3-hide w3-padding-16";
							var missionHeader = document.createElement("h4");
							missionHeader.innerText = mission.name;
							missionContent.appendChild(missionHeader);
							if(mission.video)
							{
								var missionParagraph = document.createElement("p");
								missionParagraph.innerHTML = `Start of mission: <a href="${getVideoWithStartAndEndTimestamps(mission.video, mission.startTime, mission.endTime)}">start the video at ${formatTime(mission.startTime)}</a> and stop at ${formatTime(mission.endTime)}`;
								missionContent.appendChild(missionParagraph);
							}
							missionList.appendChild(missionContent);
							break;
						case "VR":
							var missionButton = document.createElement("button");
							missionButton.className = "w3-btn w3-block w3-green w3-center-align";
							missionButton.innerText = "VR Mission " + mission.id;
							missionButton.onclick = function() { showAccordion("Mission" + mission.id) };
							missionList.appendChild(missionButton);
							var missionContent = document.createElement("div");
							missionContent.id = "Mission" + mission.id;
							missionContent.className = "w3-container w3-hide w3-padding-16";
							var missionHeader = document.createElement("h4");
							missionHeader.innerText = mission.name;
							missionContent.appendChild(missionHeader);
							if(mission.video)
							{
								var missionParagraph = document.createElement("p");
								missionParagraph.innerHTML = `Start of mission: <a href="${getVideoWithStartAndEndTimestamps(mission.video, mission.startTime, mission.endTime)}">start the video at ${formatTime(mission.startTime)}</a> and stop at ${formatTime(mission.endTime)}`;
								missionContent.appendChild(missionParagraph);
							}
							missionList.appendChild(missionContent);
							break;
					}
					
				});
			}
			function formatTime(seconds)
			{
				var minutes = Math.floor(seconds / 60);
				var remainingSeconds = seconds % 60;
				return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
			}

			function showAccordion(id, hideOthers = true) 
			{
				var x = document.getElementById(id);
				if (x.className.indexOf("w3-show") == -1) 
				{
					x.className += " w3-show";
				}
				else
				{ 
					x.className = x.className.replace(" w3-show", "");
				}
				document.querySelectorAll(".w3-container").forEach(container => {
					if(container.id !== id && hideOthers)
					{
						container.className = container.className.replace(" w3-show", "");
					}
				});
			}
			function getVideoWithTimestamp(videoUrl, timestamp)
			{
				if(videoUrl.includes("?"))
				{
					return videoUrl + `&t=${timestamp}`;
				}
				else
				{
					return videoUrl + `?t=${timestamp}`;
				}
			}
			function getVideoWithStartAndEndTimestamps(videoUrl, startTimestamp, endTimestamp)
			{
				if(videoUrl.includes("?"))
				{
					return videoUrl + `&start=${startTimestamp}&end=${endTimestamp}`;
				}
				else
				{
					return videoUrl + `?start=${startTimestamp}&end=${endTimestamp}`;
				}
			}
		</script>
		<style>
			* 
			{
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				font-family: Arial, sans-serif;
				background-color: #f4f4f4;
				color: #333;
				line-height: 1.6;
				overflow-x: hidden;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
				transition: all 0.3s ease-in-out;
				text-align: center;
			}
			h1 
			{
				font-family: "Metal Gear Solid", sans-serif;
				font-size: 3em;
				text-align: center;
				color: #333;
				text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
				padding: 0;
				margin: 0;
			}
			h2 
			{
				font-family: "Metal Gear Solid", sans-serif;
				font-size: 2em;
				color: #555;
				text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
				margin-top: 20px;
				margin-bottom: 10px;
				border-bottom: 2px solid #333;
				padding-bottom: 5px;
				text-align: center;
				background-color: #f4f4f4;
				padding: 0;
				margin: 0;
			}
			h3 
			{
				padding: 0;
				margin: 0;
			}
			hr 
			{
				padding: 0;
				margin: 0;
			}
		</style>
	</head>
	<body onload="outputMissions()">
		<h1>Metal Gear Solid</h1>
		<h2>The Board Game</h2>
		<hr>
		<h3>Missions</h3>
		<div id="missionList">
			<!-- Mission list will be generated here -->
		</div>
	</body>
</html>
