	function init()
	{
		let first = true;
		let outputElId = 'charactersWrapperDiv';
		let outputEl = document.getElementById(outputElId);
		//Generate all character divs
		chars.forEach((char) => 
		{
			//output wrapper div
			let charDiv = generateElement('div', '');
			charDiv.id = char.name.replace(' ', '_');
			let charHead = generateElement('h2', char.name);
			charDiv.appendChild(charHead);
			outputEl.appendChild(charDiv);
		});
		return;
		let t = generateElement('table', '');
		let thead = generateElement('tr', '');
		let nameth = generateElement('th', 'Name');
		thead.appendChild(nameth);
		let editionth = generateElement('th', 'Edition');
		thead.appendChild(editionth);
		let coopDiffth = generateElement('th', 'Coop Diff.');
		thead.appendChild(coopDiffth);
		let soloDiffth = generateElement('th', 'Solo Diff.');
		thead.appendChild(soloDiffth);
		let statHealthTH = generateElement('th', 'Health');
		thead.appendChild(statHealthTH);
		let statDexTH = generateElement('th', 'Dexterity');
		thead.appendChild(statDexTH);
		let statAttackTH = generateElement('th', 'Attack');
		thead.appendChild(statAttackTH);
		let statDefenseTH = generateElement('th', 'Defense');
		thead.appendChild(statDefenseTH);
		let professionsTH = generateElement('th', 'Professions');
		thead.appendChild(professionsTH);
		t.appendChild(thead);
		chars.forEach((char) => 
		{
			let data = 
			[
				char.name, 
				char.edition, 
				char.difficulty.coop, 
				char.difficulty.solo, 
				char.stats.health, 
				char.stats.dexterity, 
				char.stats.attack, 
				char.stats.defense, 
				char.professions.join(', ')
			];
			let tr = generateTableRow(data);
			t.appendChild(tr);
		});
		document.body.appendChild(t);
	}
	const generateElement = (type, content) => 
	{
		let el = document.createElement(type);
		if(content != '')
		{
			el.innerHTML = content;
		}
		return el;
	}
	const generateTableRow = (strArr) => 
	{
		let tr = document.createElement('tr');
		strArr.forEach((str) => 
		{
			let td = document.createElement('td');
			td.innerHTML = str;
			tr.appendChild(td);
		});
		return tr;
	}
