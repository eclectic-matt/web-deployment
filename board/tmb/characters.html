	var selectedChar = chars[0].name.replace(' ','_');
	
	var allCharNames = chars.map((c)=>{return c.name.replace(' ','_');});
	
	function init()
	{
		let first = true;
		let outputElId = 'charactersWrapperDiv';
		let outputEl = document.getElementById(outputElId);
		
		//Generate all character divs
		chars.forEach((char) => 
		{
			//output wrapper div
			let charDiv = generateElement('div', '');
			charDiv.id = char.name.replace(' ', '_');
			charDiv.classList.add('charDiv');
			if(first)
			{
				first = false;
			}
			else
			{
				charDiv.style.display = 'none';
			}
			
			//Header
			let charHead = generateElement('h2', char.name);
			charHead.classList.add('characterName');
			charDiv.appendChild(charHead);
			
			//Difficulties
			let coopDifficutyP =generateElement('p','Coop Difficulty: ');
			let coopSpan = generateElement('span',char.difficulty.coop);
			coopDifficutyP.appendChild(coopSpan);
			charDiv.appendChild(coopDifficutyP);
			let soloDifficultyP = generateElement('p', 'Solo Difficulty: ');
			let soloSpan = generateElement('span',char.difficulty.solo);
			soloDifficultyP.appendChild(soloSpan);
			charDiv.appendChild(soloDifficultyP);
			
			//edition
			let editionP = generateElement('p', 'Edition: ' + char.edition);
			charDiv.appendChild(editionP);
			
			//range 
			let rangeP = generateElement('p', 'Range: ' + char.range);
			charDiv.appendChild(rangeP);
			
			//stats
			let statsP = generateElement('p', 'Stats:');
			charDiv.appendChild(statsP);
			let statsUl = generateElement('ul','');
			let healthLi = generateElement('li', 'Health: ' + char.stats.health);
			statsUl.appendChild(healthLi);
			let dexLi = generateElement('li', 'Dex: ' + char.stats.dexterity);
			statsUl.appendChild(dexLi);
			let atkLi = generateElement('li', 'Atk: ' + char.stats.attack);
			statsUl.appendChild(atkLi);
			let defLi = generateElement('li', 'Def: ' + char.stats.defense);
			statsUl.appendChild(defLi);
			charDiv.appendChild(statsUl);
			
			//professions
			if(char.professions.length > 0)
			{
				let profsP = generateElement('p', 'Professions:');
				charDiv.appendChild(profsP);
				let profsUl = generateElement('ul','');
				char.professions.forEach((prof) => {
					let profLi = generateElement('li', prof);
					profsUl.appendChild(profLi);
				});
				charDiv.appendChild(profsUl);
			}
			
			outputEl.appendChild(charDiv);
		});
	}
	
	const getCharIndex = (name) => 
	{
		return allCharNames.indexOf(name);
	}
	
	const nextChar = () => 
	{
		let curIndex = getCharIndex(selectedChar);
		if (curIndex + 1 >= allCharNames.length)
		{
			//Get first char
			let firstName = chars[0].name.replace(' ','_');
			selectedChar = firstName;
			showChar(firstName);
		}else{
			let otherName = chars[curIndex + 1].name.replace(' ','_');
			selectedChar = otherName;
			showChar(otherName);
		}
	}
	
	const prevChar = () => 
	{
		let curIndex = getCharIndex(selectedChar);
		if (curIndex -1 < 0)
		{
			//Get last char
			let lastName = chars[allCharNames.length - 1].name.replace(' ','_');
			selectedChar = lastName;
			showChar(lastName);
		}else{
			let otherName = chars[curIndex - 1].name.replace(' ','_');
			selectedChar = otherName;
			showChar(otherName);
		}
	}
	
	
	const showChar = (name) => 
	{
		let charDivs = document.querySelectorAll('.charDiv');
		charDivs.forEach( (div) => {
			div.style.display = 'none';
		});
		let shownDiv = document.getElementById(name);
		shownDiv.style.display = 'block';
	}
	
	const generateElement = (type, content) => 
	{
		let el = document.createElement(type);
		if(content != '')
		{
			el.innerHTML = content;
		}
		return el;
	}
	
	const generateTableRow = (strArr) => 
	{
		let tr = document.createElement('tr');
		strArr.forEach((str) => 
		{
			let td = document.createElement('td');
			td.innerHTML = str;
			tr.appendChild(td);
		});
		return tr;
	}
