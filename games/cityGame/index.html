<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			var gameData = {
				date: {
					year: 1,
					month: 1
				},
				event: {
					type: {
						significance: "Major",
						type: "Development",
						voter: "All factions"
					},
					options: {
						title: "Build Hospital",
						costs: [
							{
								type: "Materials",
								amount: 20
							},
							{
								type: "Money",
								amount: 25
							}
						],
						benefits: [
							{
								type: "Satisfaction",
								amount: 10
							},
							{
								type: "Health",
								amount: 15
							}
						]
					}
				}
			};

			loadCurrentEvent(gameData);

			function loadCurrentEvent(data)
			{

			}
		</script>
		<style>
			* 
			{
				box-sizing: border-box;
				font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
				overflow: hidden;
			}
			.menu 
			{
				display: flex;
				justify-content: space-between;
				width: 96vw;
				margin: 0;
				padding: 10px;
				background-color: darkslategray;
				color: white;
			}
			.menuBtn button
			{
				background-color: lightgreen;
				border-radius: 0.5rem;
				color: brown;
			}
			.menuBtn button:hover
			{
				background-color: darkgreen;
				color: yellow;
				border-radius: 0.5rem;
			}
			.voteOption 
			{
				display: flex;
				flex-direction: row;

				padding: 10px;
				margin: 0.5rem 0;
				max-width: 100vw;

				border: 2px outset grey;
				border-radius: 1rem;
				
				background-color: darkgoldenrod;
				color: black;

				text-align: left;
				user-select: none;

				left: -100vw;

				animation-name: voteOptionAppears;
				animation-timing-function: ease-in;
				animation-iteration-count: 1;
			}
			.voteOption:nth-of-type(1)
			{
				animation-duration: 1s;
				animation-delay: 0s;
			}
			.voteOption:nth-of-type(2)
			{
				animation-duration: 1s;
				animation-delay: 0.5s;
			}
			.voteOption:hover 
			{
				background-color: goldenrod;
				color: white;
				border: 2px outset gold;
			}
			.voteCosts, .voteBenefits 
			{
				flex-basis: grow;
			}
			.event 
			{
				text-align: center;
			}
			@keyframes voteOptionAppears 
			{
				from 
				{
					opacity: 0%;
					transform: translateX(-100vw);
				}
				to 
				{
					opacity: 100%;
					transform: translateX(0vw);
				}
			}
			.tabs 
			{
				position: absolute;
				bottom: 0;
				width: 100vw;
				overflow: hidden;
				height: 2rem;
				background-color: darkslategray;
				flex-flow: row wrap;
				justify-content: space-between;
			}
			.tab 
			{
				padding: 0;
				margin: 0;
				width: 20vw;
				float: left;
				flex-basis: grow;
			}
		</style>
	</head>
	<body>
		<div class="gameWrapper">
			<!-- Current Date + Hamburger Menu -->
			<div class="menu">
				<div class="dateView">Year 1, January</div>
				<div class="menuBtn">
					<button>&#9776;</button>
				</div>
			</div>
			<!-- The current main content area -->
			<div class="main event">
				<h2>Major Development</h2>
				<h3>All factions vote:</h3>
				<div class="voteWrapper">
					<div class="voteOption">
						<h1>Build Hospital</h1>
						<div class="voteCosts">
							Costs:
								<ul class="voteCostsUl">
									<li>15 MAT</li>
									<li>10 MON</li>
								</ul>
						</div>
						<div class="voteBenefits">
							Benefits: 
							<ul class="voteBenefitsUl">
								<li>+15 HEA</li>
								<li>+10 SAT</li>
							</ul>
						</div>
					</div>

					<div class="voteOption">
						<h1>Build Barracks</h1>
						<div class="voteCosts">
							Costs:
								<ul class="voteCostsUl">
									<li>35 MAT</li>
									<li>25 MON</li>
								</ul>
						</div>
						<div class="voteBenefits">
							Benefits: 
							<ul class="voteBenefitsUl">
								<li>+15 SEC</li>
								<li>-5 SAT</li>
							</ul>
						</div>
					</div>
				</div>
				<h4>4 out of 6 votes cast...</h4>
			</div>
			<!-- Tabs to switch between:
				- event
				- faction map
				- faction info
				- city info
			-->
			<div class="tabs">
				<div class="tab showEvent">
					<button id="showTab(event)">Event Tab</button>
				</div>
				<div class="tab showDistrict">
					<button id="showTab(district)">District</button>
				</div>
				<div class="tab showCity">
					<button id="showTab(city)">City</button>
				</div>
				<div class="tab showStats">
					<button id="showTab(stats)">Stats</button>
				</div>
			</div>
		</div>
	</body>
</html>
