<!DOCTYPE html>
<html>
	<head>
		<script>
			clickMap = (ev) => {
				//console.log(ev.target);
				let clickX = ev.clientX;
				let clickY = ev.clientY;
				console.log("Click Detected at ", clickX, clickY);
				//Rework these as percentages from top and left
				let imgWidthPx = ev.target.width;
				let imgHeightPx = ev.target.height;
				let percentX = (clickX / imgWidthPx) * 100;
				let percentY = (clickY / imgHeightPx) * 100;
				console.log("Click percentages: ", percentX, percentY);
			}
		</script>
	</head>
	<body>
		<img 
			src="../images/map_europe.png"
			alt="Europe" 
			usemap="#workmap" 
			width="800" 
			height="600" 
			onclick="clickMap(event)"
			style="border:5px solid black;"
		>
